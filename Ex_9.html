<!DOCTYPE html>
<html >
<head>
    <title>Styled Blockquote</title>
    <style>
        blockquote {
            border-left: 5px solid #007BFF; 
            font-style: italic;             
            padding-left: 15px;             
            margin: 20px 0;                 
            color: #555555;                 
        }
    </style>
</head>
<body>

    <p>According to the lead researcher of the project:</p>

    <blockquote>
        "Success is not final, failure is not fatal: it is the courage to continue that counts."
    </blockquote>

    <p>This quote inspired the entire team to keep pushing forward.</p>

</body>
</html>

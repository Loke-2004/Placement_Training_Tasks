<!DOCTYPE html>
<html>
<head>
    <meta>
    <title>Simple Badges</title>
    <style>
        .badge-success {
            background-color: green;
            color: white;
            padding: 5px 10px;
            border-radius: 10px;
            font-family: sans-serif;
        }
        .badge-warning {
            background-color: yellow;
            color: black;
            padding: 5px 10px;
            border-radius: 10px;
            font-family: sans-serif;
        }
        .badge-error {
            background-color: red;
            color: white;
            padding: 5px 10px;
            border-radius: 10px;
            font-family: sans-serif;
        }
    </style>
</head>
<body>

    <span class="badge-success">Success</span>
    <span class="badge-warning">Warning</span>
    <span class="badge-error">Error</span>

</body>
</html>

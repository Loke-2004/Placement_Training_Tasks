<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Simple HTML Table</title>
</head>
<body>

    <h2>Simple HTML Table (No CSS)</h2>

    <table border="1" cellpadding="8">
        
        <tr bgcolor="#CCCCCC">
            <th>Name</th>
            <th>Age</th>
            <th>Role</th>
        </tr>

        <tr bgcolor="#F2F2F2">
            <td>Alice</td>
            <td>28</td>
            <td>Designer</td>
        </tr>

        <tr>
            <td>Bob</td>
            <td>32</td>
            <td>Developer</td>
        </tr>

        <tr bgcolor="#F2F2F2">
            <td>Charlie</td>
            <td>24</td>
            <td>Manager</td>
        </tr>

        <tr>
            <td>Diana</td>
            <td>29</td>
            <td>Writer</td>
        </tr>

    </table>

</body>
</html>
